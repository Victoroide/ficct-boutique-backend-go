services:
  go-core:
    environment:
      WEBHOOK_INVOICE_URL: http://n8n:5678/webhook/ficct-invoice
      WEBHOOK_HMAC_SECRET: change-me-strong-random-secret
      WEBHOOK_DISPATCH_INTERVAL_SECONDS: "2"
      WEBHOOK_MAX_RETRIES: "8"

  express-docs:
    environment:
      S3_PUBLIC_ENDPOINT: http://minio:9000

  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: ficct-full-gotenberg
    ports:
      - "3000:3000"

  mailpit:
    image: axllent/mailpit:latest
    container_name: ficct-full-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

  n8n-import:
    image: n8nio/n8n:1.107.4
    container_name: ficct-full-n8n-import
    environment:
      N8N_ENCRYPTION_KEY: ficct-n8n-local-test-encryption-key-32
      N8N_USER_FOLDER: /home/node/.n8n
      DB_SQLITE_POOL_SIZE: "2"
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./docs/n8n:/workflows:ro
    entrypoint: /bin/sh
    command: >
      -lc "n8n import:credentials --input=/workflows/ficct-mailpit-smtp.credentials.json &&
           n8n import:workflow --input=/workflows/ficct-invoice-workflow.json &&
           n8n update:workflow --all --active=true"

  n8n:
    image: n8nio/n8n:1.107.4
    container_name: ficct-full-n8n
    depends_on:
      n8n-import:
        condition: service_completed_successfully
      gotenberg:
        condition: service_started
      mailpit:
        condition: service_started
    environment:
      N8N_ENCRYPTION_KEY: ficct-n8n-local-test-encryption-key-32
      N8N_USER_FOLDER: /home/node/.n8n
      N8N_HOST: localhost
      N8N_PORT: "5678"
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678/
      N8N_SECURE_COOKIE: "false"
      N8N_USER_MANAGEMENT_DISABLED: "true"
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
      NODE_FUNCTION_ALLOW_BUILTIN: crypto
      WEBHOOK_HMAC_SECRET: change-me-strong-random-secret
      GOTENBERG_URL: http://gotenberg:3000
      GO_CORE_GRAPHQL_URL: http://go-core:8080/graphql
      EXPRESS_DOCS_URL: http://express-docs:8081
      FICCT_N8N_SERVICE_EMAIL: ${FICCT_N8N_SERVICE_EMAIL}
      FICCT_N8N_SERVICE_PASSWORD: ${FICCT_N8N_SERVICE_PASSWORD}
      FICCT_INVOICE_FROM_EMAIL: facturas@ficct.local
      DB_SQLITE_POOL_SIZE: "2"
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
      EXECUTIONS_DATA_SAVE_ON_SUCCESS: all
      EXECUTIONS_DATA_SAVE_ON_ERROR: all
      EXECUTIONS_DATA_SAVE_ON_PROGRESS: "true"
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n

  n8n-e2e:
    build:
      context: .
      dockerfile: docs/n8n/e2e.Dockerfile
    image: ficct-n8n-invoice-e2e:local
    profiles:
      - n8n-e2e
    working_dir: /work
    environment:
      GO_GRAPHQL_URL: http://go-core:8080/graphql
      EXPRESS_DOCS_URL: http://express-docs:8081
      N8N_WEBHOOK_URL: http://n8n:5678/webhook/ficct-invoice
      MAILPIT_API_URL: http://mailpit:8025
      WEBHOOK_HMAC_SECRET: change-me-strong-random-secret
      PGHOST: go-postgres
      PGUSER: ficct
      PGPASSWORD: ficct
      PGDATABASE: ficct_boutique
    volumes:
      - ./docs/n8n:/work:ro
      - n8n_data:/n8n-data:ro

volumes:
  n8n_data:
    name: ficct_full_n8n_data
