services:
  postgres:
    image: postgres:16-alpine
    container_name: ficct-go-postgres
    environment:
      POSTGRES_USER: ficct
      POSTGRES_PASSWORD: ficct
      POSTGRES_DB: ficct_boutique
    ports:
      - "5432:5432"
    volumes:
      - ficct_go_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ficct -d ficct_boutique"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ficct-boutique-backend-go:dev
    container_name: ficct-go-app
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://ficct:ficct@postgres:5432/ficct_boutique?sslmode=disable
      JWT_PRIVATE_KEY_PATH: /app/.tools/keys/jwt_private_dev.pem
      JWT_PUBLIC_KEY_PATH: /app/.tools/keys/jwt_public_dev.pem
    ports:
      - "8080:8080"
    # Keys are baked into the image via Dockerfile COPY. To rotate them
    # locally, rebuild: `docker compose build --no-cache app`.
    restart: unless-stopped

volumes:
  ficct_go_pg_data:
    name: ficct_go_pg_data
