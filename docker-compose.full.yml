# Meta-compose for the entire FICCT Boutique system.
#
# Run from this directory:
#   docker compose -f docker-compose.full.yml up -d --build
#
# References sibling repositories with relative paths. Each backend service
# also has its own self-contained docker-compose.yml in its repo; this file
# is purely for the end-to-end demo.

services:
  # ----- MS1: Go core backend -----
  go-postgres:
    image: postgres:16-alpine
    container_name: ficct-full-go-pg
    environment:
      POSTGRES_USER: ficct
      POSTGRES_PASSWORD: ficct
      POSTGRES_DB: ficct_boutique
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ficct -d ficct_boutique"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - full_go_pg_data:/var/lib/postgresql/data

  go-core:
    build:
      context: .
      dockerfile: Dockerfile
    image: ficct-boutique-backend-go:full
    container_name: ficct-full-go
    depends_on:
      go-postgres:
        condition: service_healthy
      fake-expo-push:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://ficct:ficct@go-postgres:5432/ficct_boutique?sslmode=disable
      JWT_PRIVATE_KEY_PATH: /app/.tools/keys/jwt_private_dev.pem
      JWT_PUBLIC_KEY_PATH: /app/.tools/keys/jwt_public_dev.pem
      JWT_ISSUER: ficct-go
      JWT_AUDIENCE: ficct-express,ficct-django,ficct-angular,ficct-mobile
      JWT_KEY_ID: dev-1
      CORS_ALLOWED_ORIGINS: http://localhost:4200,http://localhost:19006,http://localhost:4300
      WEBHOOK_HMAC_SECRET: change-me-strong-random-secret
      APP_LOG_LEVEL: info
      APP_ENV: development
      # Point the push sender at the fake Expo container instead of the real
      # https://exp.host service. For production, unset this (default falls
      # back to the real Expo URL).
      EXPO_PUSH_API_URL: http://fake-expo-push:8080/--/api/v2/push/send
    ports:
      - "8093:8080"
    # Keys baked into the image (see Go Dockerfile + .dockerignore note).
    # Host port 8093 — host 8080/8090 often used by other dev stacks.
    command: >
      sh -c "migrate up && seed && server"

  # Fake Expo Push API — emulates https://exp.host/--/api/v2/push/send so the
  # full Docker stack can prove the server-side push sender without reaching
  # the real Expo service. Inspector endpoint at /inspect/calls.
  fake-expo-push:
    build:
      context: .
      dockerfile: cmd/fake-expo-push/Dockerfile
    image: ficct-boutique-fake-expo-push:full
    container_name: ficct-full-fake-expo
    environment:
      FAKE_EXPO_MODE: per-token
      PORT: "8080"
    ports:
      - "8095:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ----- MS3: Express document backend -----
  docs-postgres:
    image: postgres:16-alpine
    container_name: ficct-full-docs-pg
    environment:
      POSTGRES_USER: ficct
      POSTGRES_PASSWORD: ficct
      POSTGRES_DB: ficct_documents
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ficct -d ficct_documents"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - full_docs_pg_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:RELEASE.2024-09-13T20-26-02Z
    container_name: ficct-full-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio-access
      MINIO_ROOT_PASSWORD: minio-secret-change-me
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "9010:9000"
      - "9011:9001"
    volumes:
      - full_minio_data:/data

  minio-bootstrap:
    image: minio/mc:RELEASE.2024-09-09T07-53-10Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "
        mc alias set local http://minio:9000 minio-access minio-secret-change-me &&
        mc mb --ignore-existing local/ficct-documents &&
        mc anonymous set none local/ficct-documents
      "

  express-docs:
    build:
      context: ../../typescript/ficct-boutique-backend-express
      dockerfile: Dockerfile
    image: ficct-boutique-backend-express:full
    container_name: ficct-full-docs
    depends_on:
      docs-postgres:
        condition: service_healthy
      minio-bootstrap:
        condition: service_completed_successfully
    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://ficct:ficct@docs-postgres:5432/ficct_documents
      JWT_PUBLIC_KEY_PATH: /app/.tools/keys/jwt_public_dev.pem
      JWT_ISSUER: ficct-go
      JWT_AUDIENCE: ficct-express
      JWT_KEY_ID: dev-1
      CORS_ALLOWED_ORIGINS: http://localhost:4200,http://localhost:19006
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: http://localhost:9010
      S3_REGION: us-east-1
      S3_FORCE_PATH_STYLE: "true"
      S3_BUCKET: ficct-documents
      S3_ACCESS_KEY_ID: minio-access
      S3_SECRET_ACCESS_KEY: minio-secret-change-me
      S3_PRESIGN_EXPIRY_SECONDS: "900"
    ports:
      - "8091:8081"
    # Keys baked into the image. For prod, inject via Docker secrets.
    # Host port 8091.
    command: >
      sh -c "node dist/database/migrate.js && node dist/server.js"

  # ----- MS2: Django AI backend -----
  dynamodb:
    image: amazon/dynamodb-local:2.5.2
    container_name: ficct-full-dynamo
    # In-memory mode keeps the dev stack idempotent and avoids volume permission
    # issues on Windows hosts. Tables are recreated on each startup by Django's
    # ensure_tables management command.
    command: ["-jar", "DynamoDBLocal.jar", "-inMemory", "-sharedDb"]
    working_dir: /home/dynamodblocal

  django-ai:
    build:
      context: ../../python/django/ficct-boutique-backend-python
      dockerfile: Dockerfile
      args:
        REQUIREMENTS: dev.txt
    image: ficct-boutique-backend-python:full
    container_name: ficct-full-ai
    depends_on:
      - dynamodb
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      SECRET_KEY: dev-secret-change-me
      DEBUG: "True"
      ALLOWED_HOSTS: "*"
      JWT_PUBLIC_KEY_PATH: /app/.tools/keys/jwt_public_dev.pem
      JWT_ISSUER: ficct-go
      JWT_AUDIENCE: ficct-django
      DYNAMODB_ENDPOINT: http://dynamodb:8000
      DYNAMODB_REGION: us-east-1
      DYNAMODB_ACCESS_KEY_ID: local
      DYNAMODB_SECRET_ACCESS_KEY: local
      DYNAMODB_TABLE_PREFIX: ficct_
      CORS_ALLOWED_ORIGINS: http://localhost:4200,http://localhost:19006
      GO_CORE_BASE_URL: http://go-core:8080
      PORT: "8000"
    ports:
      - "8092:8000"
    # Keys baked into the image. Code volume removed so the production-style
    # image is used (matches the way Express runs in this stack).
    # Host port 8092.
    command: >
      sh -c "python manage.py ensure_tables &&
             python manage.py runserver 0.0.0.0:8000"

  # ----- Angular admin frontend -----
  angular-admin:
    build:
      context: ../../angular/ficct-boutique-frontend-angular
      dockerfile: Dockerfile
    image: ficct-boutique-frontend-angular:full
    container_name: ficct-full-admin
    depends_on:
      - go-core
      - express-docs
      - django-ai
    ports:
      - "4200:80"

  # ----- React Native customer app served via Expo Web + nginx reverse proxy -----
  # Same-origin /graphql + /api/ai routes solve the cross-container localhost
  # problem and let Playwright (or any browser) actually use the customer app.
  mobile-web:
    build:
      context: ../../react/react-native/ficct-boutique-mobile-react-native
      dockerfile: Dockerfile.web
    image: ficct-boutique-mobile-web:full
    container_name: ficct-full-mobile
    depends_on:
      - go-core
      - django-ai
    ports:
      - "4300:80"

volumes:
  full_go_pg_data:
    name: ficct_full_go_pg_data
  full_docs_pg_data:
    name: ficct_full_docs_pg_data
  full_minio_data:
    name: ficct_full_minio_data
